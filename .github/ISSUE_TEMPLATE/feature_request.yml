name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: need
    attributes:
      label: What user need would this solve?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Suggested solution
    validations:
      required: true
  - type: checkboxes
    id: principles
    attributes:
      label: Project principles
      options:
        - label: This can preserve client-side generation and requires no user tracking.
          required: true
