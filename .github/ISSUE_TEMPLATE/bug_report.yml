name: Bug report
description: Report a reproducible problem with the generator or website
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private QR payloads, passwords, or security vulnerabilities. Report vulnerabilities privately through GitHub Security Advisories.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. Choose…\n2. Enter…\n3. Click…"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      placeholder: Firefox 128 on Windows 11
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots are welcome if they contain no private information.
