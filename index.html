<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Get QR Code | Free QR Generator</title>
<meta name="description" content="Create free QR codes for websites, PDFs, videos, WhatsApp, images, and WiFi. Fast, secure, and client-side." />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>Get QR Code</h1>
  <p>Create free QR codes instantly. Private. Fast. No signup.</p>
  <a href="https://buymeacoffee.com/yourname" target="_blank" rel="noopener">☕ Buy Me a Coffee</a>
</header>

<main>
  <section>
    <label for="type">QR Type</label>
    <select id="type">
      <option value="url">Website</option>
      <option value="pdf">PDF</option>
      <option value="video">Video</option>
      <option value="whatsapp">WhatsApp</option>
      <option value="image">Image</option>
      <option value="wifi">WiFi</option>
    </select>

    <label for="content">Content</label>
    <textarea id="content" placeholder="Enter content here"></textarea>

    <button id="generateBtn">Generate QR</button>
    <div id="qr-output"></div>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="app.js"></script>
</body>
</html>
